<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="login.js"defer></script>
    <title>Login</title>
</head>
<body>


    <form id="authenticate">
        <label>Skal du logge på eller registrere deg?</label>

        <label for="login">Log in</label>
        <input type="radio" id="login" value="login" name ="authType" required>

        <label for="signup">Sign up</label>
        <input type="radio" value="signup" id="signup" name="authType" required>

        <label for="name">Skriv inn brukernavn</label>
        <input type="text" for="name" id="name" required>

        <label for="password">Skriv inn passord</label>
        <input type="text" for="password" id="password" required>

        <button type ="submit">Login</button>
    </form>
</body>
</html>
